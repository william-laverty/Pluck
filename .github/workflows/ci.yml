name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    name: Static gate + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test

  e2e:
    name: Real-browser integration (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Serve fixture and run e2e
        run: |
          python3 -m http.server 8753 &
          sleep 1
          npm run test:e2e

  package:
    name: Store zip builds
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run package
      - uses: actions/upload-artifact@v7
        with:
          name: pluck-store-zip
          path: dist/*.zip
          retention-days: 30
