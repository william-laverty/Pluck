version: 2
updates:
  # extension dev deps (jsdom, playwright)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    groups:
      dev-dependencies:
        patterns: ["*"]

  # marketing site (next, react, tailwind)
  - package-ecosystem: npm
    directory: "/site"
    schedule:
      interval: monthly
    groups:
      site-dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
