<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>Pluck</title>
  </head>
  <body>
    <header class="brand">
      <span class="mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none">
          <path d="M5 5h4M5 5v4M19 5h-4M19 5v4M5 19h4M5 19v-4M19 19h-4M19 19v-4"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          <circle cx="12" cy="12" r="2" fill="currentColor" />
        </svg>
      </span>
      <div class="brand-text">
        <h1>Pluck</h1>
        <p>Click an element → copy it for your AI agent</p>
      </div>
    </header>

    <button id="start" class="start">
      <span>Start inspecting</span>
      <kbd id="hotkey">⌘⇧E</kbd>
    </button>

    <section class="shortcut-row">
      <span class="shortcut-label">Keyboard shortcut</span>
      <button id="shortcut-btn" class="shortcut-chip" title="Click, then press your shortcut">⌘⇧E</button>
    </section>

    <section class="modes">
      <span class="modes-label">Copy format</span>
      <div class="seg" role="radiogroup" aria-label="Copy format">
        <button class="seg-btn" data-mode="selector" role="radio">Selector</button>
        <button class="seg-btn" data-mode="context" role="radio">+ Context</button>
        <button class="seg-btn" data-mode="full" role="radio">Full</button>
      </div>
      <p class="modes-hint" id="mode-hint"></p>
    </section>

    <section class="history">
      <div class="history-head">
        <span>Recent</span>
        <button id="clear" class="link" hidden>Clear</button>
      </div>
      <ul id="history-list" class="history-list"></ul>
      <p id="history-empty" class="empty">Nothing plucked yet. Hit the shortcut on any page.</p>
    </section>

    <footer class="foot">
      <div class="foot-row">
        <button id="reset-shortcut" class="link">Reset shortcut</button>
        <a class="link star" href="https://github.com/william-laverty/Pluck" target="_blank" rel="noopener noreferrer" title="Star Pluck on GitHub">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor" aria-hidden="true">
            <path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" />
          </svg>
          <span class="star-text">Star Pluck</span>
        </a>
      </div>
      <span class="muted">Esc to cancel · ↑↓ to refine</span>
    </footer>

    <div id="copied" class="copied" role="status" aria-live="polite" hidden>Copied</div>

    <script src="popup.js"></script>
  </body>
</html>
